<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Residual Mix Visualization</title>

  <!-- MapLibre CSS -->
  <link href="lib/maplibre-gl.css" rel="stylesheet" />

  <!-- MultiSelect.css (from root folder) -->
  <link href="lib/MultiSelect.css" rel="stylesheet" type="text/css" />

  <link href="country-ui.css" rel="stylesheet" type="text/css" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>

<div id="topbar">

  <div id="filters">
    <!-- YEAR (single-select) -->
    <div>
      <label for="filter-year">Year</label>
      <select id="filter-year"
              name="year">
        <!-- options populated dynamically in main.js -->
      </select>
    </div>

    <!-- REGION (multi-select, still static until you wire regions into DATA) -->
    <div style="display: none;">
      <label for="filter-region">Region</label>
      <select id="filter-region"
              name="region"
              multiple
              data-placeholder="Select"
              data-search="false">
        <option value="Europe">Europe</option>
        <option value="Asia">Asia</option>
      </select>
    </div>

    <!-- COUNTRY (single-select) -->
    <div>
      <label for="filter-country">Country</label>
      <select id="filter-country"
              name="country" multiple
              data-search="true">
        <!-- options populated dynamically in main.js -->
      </select>
    </div>

    <div>
      <label for="button_export" id="rows-count-label">Data rows</label>
      <button id="button_export">Export</button>
    </div>
  </div>
</div>

<!-- VIEW 1: WORLD MAP -->
<div id="view-map" class="view">
  <div id="map-container">
    <div id="kpi-overlay">
      <label for="kpi-color-key">Map coloring</label>
      <select id="kpi-color-key">
        <option value="perc_tracked_renewables">Tracked renewables (%)</option>
        <option value="perc_green">Renewable Share (%)</option>
      </select>
    </div>
  </div>
</div>



<!-- MapLibre JS (global maplibregl) -->
<script src="lib/maplibre-gl.js"></script>

<!-- ECharts for list view chart -->
<script src="lib/echarts.min.js"></script>

<!-- MultiSelect.js (from root folder) -->
<script src="lib/MultiSelect.js"></script>

<!-- Data -->
<script src="data/data.js"></script>
<script async src="data/data_detail.js"></script>
<script async src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- main logic and split up views, keep this order to load the js files -->
<script src="main.js"></script>
<script src="country-ui.js"></script>
<script src="view-map.js"></script>

</body>
</html>
